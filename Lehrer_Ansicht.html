<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newton-Verfahren – Lehreransicht</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #0c0c1a;
    --surface: #14142a;
    --border:  #252545;
    --muted:   #4b5280;
    --text:    #e8e8ff;
    --accent:  #818cf8;
  }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.6rem 1.5rem; background: var(--surface);
    border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 1rem;
  }
  header h1 { font-size: 1rem; font-weight: 600; color: var(--accent); white-space: nowrap; }
  .hcontrols { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
  .hcontrols button {
    padding: 0.35rem 0.85rem; border-radius: 6px;
    border: 1px solid var(--border); background: transparent;
    color: var(--accent); font-size: 0.8rem; cursor: pointer; transition: background 0.15s;
  }
  .hcontrols button:hover { background: #1f1f45; }
  .hcontrols button.danger { border-color: #7f1d1d; color: #fca5a5; }
  .hcontrols button.danger:hover { background: #3f0f0f; }
  .p-del {
    background: none; border: none; color: #fca5a5; cursor: pointer;
    font-size: 0.8rem; padding: 0 0.1rem; line-height: 1;
    opacity: 0.4; transition: opacity 0.15s; margin-left: 0.15rem;
  }
  .p-del:hover { opacity: 1; }
  #live-badge {
    font-size: 0.75rem; padding: 0.3rem 0.7rem; border-radius: 20px;
    background: #14302a; color: #6ee7b7; border: 1px solid #065f46;
  }
  #live-badge.off { background: #2a1414; color: #fca5a5; border-color: #7f1d1d; }
  #count-badge {
    font-size: 0.78rem; color: var(--muted); padding: 0.3rem 0.6rem;
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
  }
  .cfg-hint {
    background: #3f2a00; border: 1px solid #a16207; color: #fde68a;
    font-size: 0.8rem; padding: 0.5rem 1rem; border-radius: 6px; display: none;
  }
  .cfg-hint.visible { display: block; }
  main {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 1rem 2rem; gap: 1.25rem; overflow: hidden;
  }
  #stage {
    display: flex; align-items: center; justify-content: center;
    width: 100%; gap: 1.5rem; position: relative;
  }
  .outlier-group {
    display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
    flex-shrink: 0; max-width: 160px;
  }
  .outlier-pill {
    display: flex; flex-direction: column; align-items: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.4rem 0.7rem;
  }
  .outlier-val {
    font-family: 'Courier New', monospace;
    font-size: clamp(0.7rem, 1.8vw, 1.3rem);
    font-weight: 600; line-height: 1.2;
  }
  .outlier-name { font-size: 0.6rem; opacity: 0.5; margin-top: 2px; }
  #conv-wrap { text-align: center; flex: 1; min-width: 0; }
  .conv-label {
    font-size: 0.68rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem;
  }
  .no-data { font-size: 1.1rem; color: var(--muted); font-style: italic; }

  /* ── Zahlen-Layout ── */
  .num-wrap {
    display: inline-flex; align-items: flex-end; justify-content: center;
    line-height: 1;
  }
  /* Agreed: Vorkomma + Komma + gemeinsame Nachkommastellen */
  .agreed-block {
    font-family: 'Courier New', monospace; font-weight: 800;
    letter-spacing: -0.02em;
    text-shadow: 0 0 80px rgba(242,68,68,0.2);
    line-height: 1; flex-shrink: 0;
    display: flex; align-items: flex-end;
  }
  /* Diff-Bereich: Spalten nebeneinander */
  .diff-cols-wrap {
    display: flex; flex-direction: row; align-items: flex-end; flex-shrink: 0;
  }
  /* Eine Spalte = eine Nachkommastelle */
  .diff-col {
    display: flex; flex-direction: column; justify-content: flex-end;
    align-items: stretch; flex-shrink: 0;
  }
  /* Ein Block in einer Spalte */
  .diff-block {
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; overflow: hidden;
    font-family: 'Courier New', monospace; font-weight: 800; line-height: 1;
  }
  /* Namen-Spalte */
  .names-col {
    display: flex; flex-direction: column; justify-content: flex-end;
    margin-left: 0.35rem; flex-shrink: 0;
  }
  .names-block {
    display: flex; flex-direction: column; justify-content: center;
    flex-shrink: 0; overflow: hidden;
  }
  .tn-name-tag {
    font-size: 1.0rem; opacity: 0.8; white-space: nowrap; line-height: 1.35;
  }

  #step-nav { display: flex; gap: 0.6rem; align-items: center; }
  #step-nav button {
    padding: 0.4rem 1rem; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--accent); font-size: 1rem; cursor: pointer; transition: background 0.15s;
  }
  #step-nav button:hover { background: #1f1f45; }
  #step-label { font-size: 1.05rem; font-weight: 600; min-width: 90px; text-align: center; }
  #participants { width: 100%; max-width: 900px; }
  .p-title {
    font-size: 0.7rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem;
  }
  .p-grid { display: flex; flex-wrap: wrap; gap: 0.45rem; }
  .p-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.45rem 0.8rem;
    display: flex; gap: 0.65rem; align-items: center; font-size: 0.8rem;
  }
  .p-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .p-name { color: #9ca3af; }
  .p-val { font-family: monospace; font-weight: 600; }
  .p-x0 { font-size: 0.7rem; opacity: 0.45; }
</style>
</head>
<body>
<header>
  <h1>🔢 Newton-Verfahren — Lehreransicht</h1>
  <div class="hcontrols">
    <div class="cfg-hint" id="cfg-hint">⚠️ Firebase-URL fehlt!</div>
    <div id="live-badge">● LIVE</div>
    <div id="count-badge">0 Einreichungen</div>
    <button onclick="changeStep(-1)">◀ zurück</button>
    <button onclick="changeStep(1)">vor ▶</button>
    <button id="auto-btn" onclick="toggleAuto()" style="border-color:#065f46;color:#6ee7b7;">⟳ Auto: AUS</button>
    <button class="danger" onclick="clearAll()">✕ Firebase löschen</button>
    <button onclick="restoreAll()" id="restore-btn" style="display:none;">↩ Alle einblenden</button>
  </div>
</header>
<main>
  <div id="stage">
    <div class="outlier-group" id="outliers-left"></div>
    <div id="conv-wrap">
      <div class="conv-label">Konvergenz der Näherungswerte</div>
      <div class="no-data">Warte auf Einreichungen…</div>
    </div>
    <div class="outlier-group" id="outliers-right"></div>
  </div>
  <div id="step-nav">
    <button onclick="changeStep(-1)">◀</button>
    <span id="step-label">Schritt 1</span>
    <button onclick="changeStep(1)">▶</button>
  </div>
  <div id="participants">
    <div class="p-title">Eingegangene Werte</div>
    <div class="p-grid" id="p-grid">
      <span style="color:var(--muted);font-size:0.83rem;font-style:italic;">Noch keine Einreichungen.</span>
    </div>
  </div>
</main>
<script>
var FIREBASE_URL = 'https://iteration-visualizer-default-rtdb.europe-west1.firebasedatabase.app/';
var KURS_ID = 'kurs1';
var COLORS = [
  '#818cf8','#6ee7b7','#fcd34d','#f9a8d4',
  '#7dd3fc','#c4b5fd','#fda4af','#86efac','#fdba74','#a5f3fc'
];
var currentStep = 1;
var allData = {};
var colorMap = {};
var colorIdx = 0;
var deletedKeys = {};
var es = null;

function $(id) { return document.getElementById(id); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function colorFor(name) {
  if (!colorMap[name]) colorMap[name] = COLORS[colorIdx++ % COLORS.length];
  return colorMap[name];
}

function connect() {
  if (!FIREBASE_URL || FIREBASE_URL.indexOf('DEINE_FIREBASE') !== -1) {
    $('cfg-hint').classList.add('visible');
    $('live-badge').className = 'off';
    $('live-badge').textContent = '● KEINE VERBINDUNG';
    return;
  }
  if (es) es.close();
  es = new EventSource(FIREBASE_URL + '/' + KURS_ID + '/submissions.json');
  es.addEventListener('put', function(e) {
    var d = JSON.parse(e.data);
    if (d.data === null) { allData = {}; }
    else if (d.path === '/') { allData = d.data || {}; }
    else {
      var key = d.path.replace(/^\//, '');
      if (d.data === null) delete allData[key];
      else allData[key] = d.data;
    }
    render();
  });
  es.addEventListener('patch', function(e) {
    var d = JSON.parse(e.data);
    if (d.data) Object.assign(allData, d.data);
    render();
  });
  es.onopen  = function() { $('live-badge').className = '';    $('live-badge').textContent = '● LIVE'; };
  es.onerror = function() { $('live-badge').className = 'off'; $('live-badge').textContent = '● VERBINDUNGSFEHLER'; setTimeout(connect, 4000); };
}

function render() {
  var byName = {};
  Object.entries(allData).forEach(function(pair) {
    var dbKey = pair[0], e = pair[1];
    if (e.step !== currentStep) return;
    if (deletedKeys[dbKey]) return;
    e._dbKey = dbKey; // anhängen für Löschen-Button
    if (!byName[e.name] || e.ts > byName[e.name].ts) byName[e.name] = e;
  });
  var entries = Object.values(byName);
  $('step-label').textContent = 'Schritt ' + currentStep;
  $('count-badge').textContent = entries.length + ' Einreichung' + (entries.length !== 1 ? 'en' : '') + ' (Schritt ' + currentStep + ')';
  renderParticipants(entries);
  renderConvergence(entries);
  checkAutoAdvance();
}

window.deleteName = function(dbKey) {
  deletedKeys[dbKey] = true;
  $('restore-btn').style.display = '';
  render();
};

window.restoreAll = function() {
  deletedKeys = {};
  $('restore-btn').style.display = 'none';
  render();
};

function renderParticipants(entries) {
  var g = $('p-grid');
  if (!entries.length) {
    g.innerHTML = '<span style="color:var(--muted);font-size:0.83rem;font-style:italic;">Noch keine Einreichungen für diesen Schritt.</span>';
    return;
  }
  g.innerHTML = entries.map(function(e) {
    var c = colorFor(e.name);
    var x0str = e.x0 ? '<span class="p-x0">(x₀ = ' + esc(e.x0) + ')</span>' : '';
    return '<div class="p-card">' +
      '<div class="p-dot" style="background:' + c + '"></div>' +
      '<span class="p-name">' + esc(e.name) + '</span>' + x0str +
      '<span class="p-val" style="color:' + c + '">' + esc(e.value) + '</span>' +
      '<button class="p-del" data-key="' + esc(e._dbKey) + '" onclick="deleteName(this.dataset.key)" title="Ausblenden">✕</button>' +
    '</div>';
  }).join('');
}

// ══════════════════════════════════════════════════════
//  renderConvergence
// ══════════════════════════════════════════════════════
function renderConvergence(entries) {
  var wrap       = $('conv-wrap');
  var leftGroup  = $('outliers-left');
  var rightGroup = $('outliers-right');
  var label = '<div class="conv-label">Konvergenz der Näherungswerte</div>';
  leftGroup.innerHTML = '';
  rightGroup.innerHTML = '';

  if (!entries.length) {
    wrap.innerHTML = label + '<div class="no-data">Warte auf Einreichungen…</div>';
    return;
  }

  var N    = entries.length;
  var vals = entries.map(function(e) { return e.value.replace(',', '.').trim(); });

  // Alle TN werden gleichbehandelt – keine Ausreißer-Trennung mehr.
  // Vorzeichen: alle negativ?
  var allNeg = vals.every(function(v){ return v.charAt(0) === '-'; });
  var stripped = vals.map(function(v){ return allNeg && v.charAt(0)==='-' ? v.slice(1) : v; });

  // Zerlege in Vorkomma + Nachkomma, baue vollständige Ziffernfolge inkl. Punkt:
  // z.B. "1.4145678" → seq = "1.4145678" (Punkt bleibt als Zeichen drin)
  var digitSeqs = stripped.map(function(v){
    var idx = v.indexOf('.');
    if (idx === -1) return { pre: v, post: '' };
    return { pre: v.slice(0, idx), post: v.slice(idx+1) };
  });

  // Längste Vor- und Nachkommastellen bestimmen (für Padding)
  var maxPreLen  = Math.max.apply(null, digitSeqs.map(function(d){ return d.pre.length; }));
  var maxPostLen = Math.max.apply(null, digitSeqs.map(function(d){ return d.post.length; }));

  // Vollständige Sequenz pro TN inkl. Punkt:
  // Vorkomma linksbündig gepadded + '.' + Nachkomma rechts gepadded
  var seqs = digitSeqs.map(function(d){
    var pre  = d.pre;
    var post = d.post;
    while (pre.length  < maxPreLen)  pre  = ' ' + pre;
    while (post.length < maxPostLen) post = post + ' ';
    return pre + '.' + post;
  });
  var totalLen = maxPreLen + 1 + maxPostLen; // inkl. Punkt

  // Gemeinsamen Präfix bestimmen (agreed)
  var commonLen = 0;
  for (var i = 0; i < totalLen; i++) {
    var ch = seqs[0][i];
    if (ch === ' ') break; // Leerzeichen = kein gemeinsamer agreed möglich
    if (seqs.every(function(s){ return s[i] === ch; })) commonLen++;
    else break;
  }

  // agreed-String: einfach die ersten commonLen Zeichen (Punkt ist bereits drin)
  var agreedRaw = seqs[0].slice(0, commonLen).replace(/ /g, '');
  var agreedDisplay = agreedRaw;

  // Diff-Sequenzen ab erster Abweichung
  var diffSeqs = seqs.map(function(s){ return s.slice(commonLen); });
  var maxDiffLen = Math.max.apply(null, diffSeqs.map(function(s){ return s.length; }));

  var Nc     = N;
  var MAX_EM = 9;
  var fullEm = MAX_EM;
  var unitEm = fullEm / N;

  if (maxDiffLen === 0) {
    wrap.innerHTML = label + '<div class="num-wrap"><div class="agreed-block" style="font-size:'+fullEm.toFixed(3)+'rem;">'+(allNeg?'−':'')+esc(agreedDisplay)+'</div></div>';
    return;
  }

  // ── PASS 1: Skalierungsfaktoren ──
  var scale = diffSeqs.map(function(){ return []; });
  var p1groupId = diffSeqs.map(function(){ return 0; });
  var p1nextGid = 1;

  for (var col = 0; col < maxDiffLen; col++) {
    var buckets = {};
    diffSeqs.forEach(function(s, t){
      var d = col < s.length ? s[col] : null;
      if (d === null || d === ' ') return;
      var key = p1groupId[t] + ':' + d;
      if (!buckets[key]) buckets[key] = [];
      buckets[key].push(t);
    });

    diffSeqs.forEach(function(s, t){
      var d = col < s.length ? s[col] : null;
      var prev = col === 0 ? 1.0 : scale[t][col-1];
      if (d === null || d === ' ') {
        scale[t][col] = prev;
        return;
      }
      var key = p1groupId[t] + ':' + d;
      var n = buckets[key].length;
      scale[t][col] = Math.min(n / N, prev);
    });

    Object.keys(buckets).forEach(function(key){
      var gid = p1nextGid++;
      buckets[key].forEach(function(t){ p1groupId[t] = gid; });
    });
    // TN mit Leerzeichen (Padding) bleiben alle in derselben Gruppe
    var spaceGid = null;
    diffSeqs.forEach(function(s, t){
      var d = col < s.length ? s[col] : null;
      if (d === null || d === ' ') {
        if (spaceGid === null) spaceGid = p1nextGid++;
        p1groupId[t] = spaceGid;
      }
    });
  }

  // ── PASS 2: Zeilensortierung ──
  var minScale = 1 / N;
  var fusionDepth = diffSeqs.map(function(s, t){
    var depth = -1;
    for (var col = 0; col < s.length; col++) {
      if (scale[t][col] > minScale + 1e-9) depth = col;
    }
    return depth;
  });

  var order = diffSeqs.map(function(_,t){ return t; });

  // Zähle Häufigkeit jeder Ziffer pro Spalte (für Sortierung)
  var digitFreq = []; // digitFreq[col][digit] = count
  for (var col = 0; col < maxDiffLen; col++) {
    var freq = {};
    diffSeqs.forEach(function(s){
      var d = col < s.length ? s[col] : null;
      if (d && d !== ' ') freq[d] = (freq[d]||0) + 1;
    });
    digitFreq.push(freq);
  }

  order.sort(function(a, b){
    // Primär: Stelle für Stelle nach Häufigkeit der Ziffer sortieren
    // (häufigere Ziffer = größere Gruppe = weiter unten)
    var len = Math.max(diffSeqs[a].length, diffSeqs[b].length);
    for (var col = 0; col < len; col++) {
      var da = col < diffSeqs[a].length ? diffSeqs[a][col] : '';
      var db = col < diffSeqs[b].length ? diffSeqs[b][col] : '';
      if (da === db) continue;
      var ca = digitFreq[col] ? (digitFreq[col][da]||0) : 0;
      var cb = digitFreq[col] ? (digitFreq[col][db]||0) : 0;
      if (ca !== cb) return ca - cb; // kleinere Gruppe oben
      return da < db ? -1 : 1;      // gleich häufig: lexikografisch
    }
    // Gleiche Ziffernfolge: fusionDepth absteigend
    return fusionDepth[b] - fusionDepth[a];
  });

  // ── PASS 3: Rendern ──
  var groupId = diffSeqs.map(function(){ return 0; });
  var nextGid = 1;

  var html = label + '<div class="num-wrap">';

  // Agreed-Block
  if (commonLen > 0) {
    html += '<div class="agreed-block" style="font-size:'+fullEm.toFixed(3)+'rem;color:#f24444;">'
          + (allNeg ? '−' : '') + esc(agreedDisplay)
          + '</div>';
  } else if (allNeg) {
    html += '<div class="agreed-block" style="font-size:'+fullEm.toFixed(3)+'rem;color:#f24444;">−</div>';
  }

  html += '<div class="diff-cols-wrap">';

  var lastMaxSv = 1.0;

  for (var col = 0; col < maxDiffLen; col++) {

    var blocks = [];
    for (var r = 0; r < order.length; r++) {
      var t = order[r];
      var digit = col < diffSeqs[t].length ? diffSeqs[t][col] : null;
      if (digit === ' ') digit = null; // Leerzeichen = kein Inhalt
      var sv  = col < scale[t].length ? scale[t][col] : 0;
      var gid = groupId[t];

      if (blocks.length > 0) {
        var last = blocks[blocks.length - 1];
        if (digit !== null && last.digit === digit && last.gid === gid) {
          last.tiList.push(t);
          last.scaleVal = Math.min(last.scaleVal, sv);
          continue;
        }
      }
      blocks.push({ digit: digit, scaleVal: sv, tiList: [t], gid: gid });
    }

    // Neue groupIds vergeben: echte Blöcke je eigene gid, null-Blöcke alle dieselbe gid
    var nullGid = nextGid++;
    blocks.forEach(function(blk){
      if (blk.digit === null) {
        blk.tiList.forEach(function(t){ groupId[t] = nullGid; });
      } else {
        var newGid = nextGid++;
        blk.tiList.forEach(function(t){ groupId[t] = newGid; });
      }
    });

    var maxSv = 0;
    blocks.forEach(function(blk){ if (blk.digit !== null) maxSv = Math.max(maxSv, blk.scaleVal); });
    if (maxSv === 0) continue;
    lastMaxSv = maxSv;
    // Punkt ist schmaler als Ziffern (~0.35 statt 0.62)
    var isDotCol = blocks.every(function(blk){ return blk.digit === '.' || blk.digit === null; });
    var colWcur = (maxSv * MAX_EM * (isDotCol ? 0.35 : 0.62)).toFixed(3);

    html += '<div class="diff-col" style="width:'+colWcur+'rem;">';
    blocks.forEach(function(blk){
      var blockH = (blk.tiList.length * unitEm).toFixed(3);
      if (blk.digit === null) {
        html += '<div class="diff-block" style="height:'+blockH+'rem;width:'+colWcur+'rem;"></div>';
      } else {
        var fs    = (blk.scaleVal * MAX_EM).toFixed(3);
        var color;
        if (blk.tiList.length === N) {
          color = '#f24444'; // alle TN einig → rot
        } else if (blk.tiList.length === 1) {
          color = colorFor(entries[blk.tiList[0]].name); // einzelner TN
        } else {
          // Teilgruppe → Mischfarbe der TN-Farben
          color = mixColors(blk.tiList.map(function(t){ return colorFor(entries[t].name); }));
        }
        html += '<div class="diff-block" style="height:'+blockH+'rem;width:'+colWcur+'rem;font-size:'+fs+'rem;color:'+color+';">'
              + esc(blk.digit) + '</div>';
      }
    });
    html += '</div>';
  }

  html += '</div>'; // .diff-cols-wrap

  html += '<div class="names-col">';
  order.forEach(function(t){
    var c   = colorFor(entries[t].name);
    var x0  = entries[t].x0 ? ' ('+esc(entries[t].x0)+')' : '';
    html += '<div class="names-block" style="height:'+unitEm.toFixed(3)+'rem;">'
          + '<span class="tn-name-tag" style="color:'+c+';">'+esc(entries[t].name)+x0+'</span>'
          + '</div>';
  });
  html += '</div>';

  html += '</div>'; // .num-wrap
  wrap.innerHTML = html;
}

window.changeStep = function(d) { currentStep = Math.max(1, currentStep + d); render(); };

// Mischt zwei Hex-Farben gleichmäßig
function mixColors(colors) {
  var r = 0, g = 0, b = 0;
  colors.forEach(function(hex) {
    hex = hex.replace('#', '');
    r += parseInt(hex.slice(0,2), 16);
    g += parseInt(hex.slice(2,4), 16);
    b += parseInt(hex.slice(4,6), 16);
  });
  var n = colors.length;
  return '#' + [r,g,b].map(function(v){
    return Math.round(v/n).toString(16).padStart(2,'0');
  }).join('');
}

var autoAdvance = false;

window.toggleAuto = function() {
  autoAdvance = !autoAdvance;
  var btn = $('auto-btn');
  if (autoAdvance) {
    btn.textContent = '⟳ Auto: AN';
    btn.style.borderColor = '#6ee7b7';
    btn.style.color = '#6ee7b7';
    btn.style.background = '#14302a';
  } else {
    btn.textContent = '⟳ Auto: AUS';
    btn.style.borderColor = '#065f46';
    btn.style.color = '#6ee7b7';
    btn.style.background = '';
  }
  checkAutoAdvance();
};

function checkAutoAdvance() {
  if (!autoAdvance) return;

  // Namen der TN im aktuellen Schritt (gefiltert, ohne ausgeblendete)
  var currentNames = new Set();
  Object.entries(allData).forEach(function(pair) {
    var dbKey = pair[0], e = pair[1];
    if (e.step !== currentStep) return;
    if (deletedKeys[dbKey]) return;
    currentNames.add(e.name);
  });
  if (currentNames.size === 0) return;

  // Prüfe ob alle diese TN auch den nächsten Schritt eingereicht haben
  var nextStep = currentStep + 1;
  var namesInNext = new Set();
  Object.entries(allData).forEach(function(pair) {
    var dbKey = pair[0], e = pair[1];
    if (e.step !== nextStep) return;
    if (deletedKeys[dbKey]) return;
    if (currentNames.has(e.name)) namesInNext.add(e.name);
  });

  // Alle TN des aktuellen Schritts haben auch den nächsten eingereicht → weiter
  if (namesInNext.size === currentNames.size) {
    currentStep = nextStep;
    render();
    // Nochmal prüfen falls auch übernächster Schritt schon voll
    setTimeout(checkAutoAdvance, 100);
  }
}

window.clearAll = function() {
  if (!confirm('Wirklich alle Firebase-Einreichungen löschen?')) return;
  if (FIREBASE_URL.indexOf('DEINE_FIREBASE') !== -1) return;
  fetch(FIREBASE_URL + '/' + KURS_ID + '/submissions.json', { method: 'DELETE' })
    .then(function() {
      allData = {}; colorMap = {}; colorIdx = 0; deletedKeys = {};
      $('restore-btn').style.display = 'none';
      render();
    });
};

connect();
render();
</script>
</body>
